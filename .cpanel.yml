---
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/public_html/
    - export APPROOT=$HOME
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/mkdir -p $APPROOT/storage
    - /bin/cp public/index.php $DEPLOYPATH
    - /bin/cp public/robots.txt $DEPLOYPATH
    - /bin/cp public/.htaccess $DEPLOYPATH
    - /bin/cp -R public/css $DEPLOYPATH
    - /bin/cp -R public/js $DEPLOYPATH
    - /bin/cp -R public/images $DEPLOYPATH
    - /bin/cp -R config $APPROOT/config
    - /bin/cp -R lib $APPROOT/lib
    - /bin/cp -R includes $APPROOT/includes
    - /bin/cp .env.example $APPROOT/.env
    - /bin/chmod 775 $APPROOT/storage
